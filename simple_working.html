                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flex: 1, minWidth: 140 }}>
                                <label style={{ fontSize: '.72rem', color: 'var(--muted)' }}>Подпись (необяз.)</label>
                                <input
                                    value={bindLabel}
                                    onChange={(e) => setBindLabel(e.target.value)}
                                    placeholder="Тест Перу 2"
                                />
                            </div>
                            <button type="button" className="btn" onClick={saveBinding}>
                                Сохранить привязку
                            </button>
                        </div>
                        {bindMsg && (
                            <p style={{ margin: '10px 0 0', fontSize: '.85rem', color: 'var(--muted)' }}>{bindMsg}</p>
                        )}
                        {bindings.length > 0 ? (
                            <div style={{ overflowX: 'auto', marginTop: 14 }}>
                                <table className="data">
                                    <thead>
                                        <tr>
                                            <th>chat_id</th>
                                            <th>Проект</th>
                                            <th>Подпись</th>
                                            <th />
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {bindings.map((b) => (
                                            <tr key={b.chat_id}>
                                                <td style={{ fontSize: '.78rem' }}>{b.chat_id}</td>
                                                <td>{b.dashboard_key}</td>
                                                <td style={{ fontSize: '.8rem', color: 'var(--muted)' }}>{b.label || '—'}</td>
                                                <td>
                                                    <button
                                                        type="button"
                                                        className="btn btn-ghost btn-sm"
                                                        onClick={() => deleteBinding(b.chat_id)}
                                                    >
                                                        Удалить
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <p style={{ margin: '12px 0 0', fontSize: '.82rem', color: 'var(--muted)' }}>
                                Привязок пока нет.
                            </p>
                        )}
                    </div>

                    <div className="panel">
                        <h3>Системный промпт (то, что ты задашь — ядро «всевидящего ока»)</h3>
                        {promptLoading ? (
                            <p style={{ color: 'var(--muted)', margin: 0 }}>Загрузка промпта…</p>
                        ) : (
                            <>
                                <textarea
                                    className="ai-prompt-area"
                                    value={promptBody}
                                    onChange={(e) => setPromptBody(e.target.value)}
                                    spellCheck={false}
                                />
                                <div className="field-row-api">
                                    <input
                                        type="password"
                                        value={crmSecret}
                                        onChange={(e) => setCrmSecret(e.target.value)}
                                        placeholder="X-CRM-SECRET (если задан в .env)"
                                        style={{ maxWidth: 280 }}
                                    />
                                    <button type="button" className="btn" onClick={savePrompt}>
                                        Сохранить промпт на сервер
                                    </button>
                                </div>
                                {saveMsg && (
                                    <p style={{ margin: '8px 0 0', fontSize: '.85rem', color: 'var(--muted)' }}>
                                        {saveMsg}
                                    </p>
                                )}
                            </>
                        )}
                    </div>

                    <div className="panel">
                        <h3>Сводка по текущему дашборду (роль + фильтры + демо-метрики)</h3>
                        <p style={{ margin: '0 0 12px', color: 'var(--muted)', fontSize: '.85rem' }}>
                            Отправляет на сервер вашу роль и выбранные на дашборде фильтры; цифры пока демо — позже
                            подключим живые данные и отчёты из Telegram.
                        </p>
                        <button type="button" className="btn" onClick={runDashboard} disabled={dashLoading}>
                            {dashLoading ? 'Генерация…' : 'Сгенерировать разбор'}
                        </button>
                        {dashOut && (
                            <pre className="ai-pre" style={{ marginTop: 14 }}>
                                {dashOut}
                            </pre>
                        )}
                    </div>

                    <div className="panel">
                        <h3>Последние сообщения из Telegram-бота</h3>
                        {tg.length === 0 ? (
                            <p style={{ margin: 0, color: 'var(--muted)', fontSize: '.88rem' }}>
                                Пока пусто — напишите боту или проверьте TELEGRAM_BOT_TOKEN.
                            </p>
                        ) : (
                            <div style={{ overflowX: 'auto' }}>
                                <table className="data">
                                    <thead>
                                        <tr>
                                            <th>Время</th>
                                            <th>Кто</th>
                                            <th>Текст</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {tg.map((row) => (
                                            <tr key={row.id}>
                                                <td style={{ whiteSpace: 'nowrap' }}>{row.created_at}</td>
                                                <td>{row.username || row.user_id || '—'}</td>
                                                <td style={{ maxWidth: 420, wordBreak: 'break-word' }}>
                                                    {row.text || '—'}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    <div className="panel">
                        <h3>Недавние ответы ИИ (превью)</h3>
                        {insights.length === 0 ? (
                            <p style={{ margin: 0, color: 'var(--muted)', fontSize: '.88rem' }}>Пока нет записей.</p>
                        ) : (
                            <ul style={{ margin: 0, paddingLeft: 18, color: 'var(--muted)', fontSize: '.85rem' }}>
                                {insights.map((row) => (
                                    <li key={row.id} style={{ marginBottom: 8 }}>
                                        <strong style={{ color: 'var(--text)' }}>{row.context_type}</strong> ·{' '}
                                        {row.created_at}
                                        <br />
                                        {row.preview}
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                </div>
            );
        }

        function getNavForRole(role) {
            const common = { dashboard: { id: 'dashboard', name: 'Дашборд', icon: '📊' } };
            const roadmap = { id: 'roadmap', name: 'Roadmap', icon: '📋' };
            if (role === ROLES.BUYING) {
                return withAiEye([
                    common.dashboard,
                    roadmap,
                    { id: 'links', name: 'Ссылки и закупы', icon: '🔗' },
                    { id: 'cabinet', name: 'Кабинеты FB', icon: '📱' }
                ]);
            }
            if (role === ROLES.PROCESSING) {
                return withAiEye([common.dashboard, roadmap, { id: 'projects', name: 'Проекты и касса', icon: '💰' }]);
            }
            if (role === ROLES.ADMIN) {
                return withAiEye([
                    common.dashboard,
                    roadmap,
                    { id: 'bot-reports', name: 'Отчеты бота', icon: '🤖' },
                    { id: 'users', name: 'Пользователи', icon: '👤' }
                ]);
            }
            if (role === ROLES.CONTENT) {
                return withAiEye([common.dashboard, roadmap, { id: 'posts', name: 'Посты и кнопки', icon: '📝' }]);
            }
            return withAiEye([common.dashboard, roadmap]);
        }

        function Dashboard({ user, onLogout }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [dashProject, setDashProject] = useState('all');
            const [dashBuyer, setDashBuyer] = useState('all');
            const [buyerOptions, setBuyerOptions] = useState([{ value: 'all', label: 'Все баеры' }]);
            const [dashProcessor, setDashProcessor] = useState('all');
            const [processorOptions, setProcessorOptions] = useState([{ value: 'all', label: 'Все обработчики' }]);
            const [dashPeriod, setDashPeriod] = useState('today');
            const [dashDate, setDashDate] = useState(() => todayIsoDate());
            const [dashDateFrom, setDashDateFrom] = useState('');
            const [dashDateTo, setDashDateTo] = useState('');
            const [kpiReloadKey, setKpiReloadKey] = useState(0);
            const nav = getNavForRole(user.role);

            const filterCtx = useMemo(
                () => ({
                    project: dashProject,
                    buyer: dashBuyer,
                    processor: dashProcessor,
                    period: dashPeriod,
                    reportDate: dashDate,
                    dateFrom: dashDateFrom,
                    dateTo: dashDateTo,
                    projectName: projectLabel(dashProject),
                    buyerName: buyerLabel(dashBuyer, buyerOptions),
                    processorName: processorLabel(dashProcessor, processorOptions),
                    periodLabel: dashPeriodLabel(dashPeriod)
                }),
                [dashProject, dashBuyer, dashProcessor, dashPeriod, dashDate, dashDateFrom, dashDateTo, buyerOptions, processorOptions]
            );

            const [kpiPack, setKpiPack] = useState(null);
            const canEditSingleDay =
                user.role === ROLES.ADMIN &&
                filterCtx.project !== 'all' &&
                !filterCtx.dateFrom &&
                !filterCtx.dateTo &&
                /^\d{4}-\d{2}-\d{2}$/.test(filterCtx.reportDate || '');

            const editMetricForDay = useCallback(
                (metricKey, currentValue) => {
                    if (!canEditSingleDay) return;
                    const current = Number.isFinite(currentValue) ? currentValue : '';
                    const raw = window.prompt(`Правка метрики "${metricKey}" за ${filterCtx.reportDate}`, String(current));
                    if (raw == null) return;
                    const v = parseFloat(String(raw).replace(',', '.'));
                    if (!Number.isFinite(v)) {
                        window.alert('Введите число.');
                        return;
                    }
                    const base = getCrmApiBase().replace(/\/$/, '');
                    fetch(`${base}/api/kpis/overrides`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            report_date: filterCtx.reportDate,
                            dashboard_key: filterCtx.project,
                            processor_key: filterCtx.processor || 'all',
                            key: metricKey,
                            value: v
                        })
                    })
                        .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
                        .then(({ ok, j }) => {
                            if (!ok) throw new Error(j.error || 'Ошибка сохранения');
                            setKpiReloadKey((x) => x + 1);
                        })
                        .catch((e) => window.alert(e.message || 'Ошибка сохранения'));
                },
                [canEditSingleDay, filterCtx.reportDate, filterCtx.project, filterCtx.processor]
            );

            useEffect(() => {
                let cancelled = false;
                const base = getCrmApiBase().replace(/\/$/, '');
                fetch(`${base}/api/filters/processors?project=${encodeURIComponent(filterCtx.project)}`)
                    .then((r) => r.json())
                    .then((rows) => {
                        if (cancelled) return;
                        const opts = Array.isArray(rows) && rows.length ? rows : [{ value: 'all', label: 'Все обработчики' }];
                        setProcessorOptions(opts);
                        if (!opts.some((x) => x.value === filterCtx.processor)) {
                            setDashProcessor('all');
                        }
                    })
                    .catch(() => {
                        if (!cancelled) setProcessorOptions([{ value: 'all', label: 'Все обработчики' }]);
                    });
                fetch(`${base}/api/filters/buyers?project=${encodeURIComponent(filterCtx.project)}`)
                    .then((r) => r.json())
                    .then((rows) => {
                        if (cancelled) return;
                        const opts = Array.isArray(rows) && rows.length ? rows : [{ value: 'all', label: 'Все баеры' }];
                        setBuyerOptions(opts);
                        if (!opts.some((x) => x.value === filterCtx.buyer)) setDashBuyer('all');
                    })
                    .catch(() => {
                        if (!cancelled) setBuyerOptions([{ value: 'all', label: 'Все баеры' }]);
                    });
                fetch(
                    `${base}/api/kpis/live?project=${encodeURIComponent(filterCtx.project)}&buyer=${encodeURIComponent(filterCtx.buyer)}&processor=${encodeURIComponent(filterCtx.processor)}&period=${encodeURIComponent(filterCtx.period)}&date=${encodeURIComponent(filterCtx.reportDate || '')}&date_from=${encodeURIComponent(filterCtx.dateFrom || '')}&date_to=${encodeURIComponent(filterCtx.dateTo || '')}&role=${encodeURIComponent(user.role)}`
                )
                    .then((r) => r.json())
                    .then((d) => {
                        if (cancelled) return;
                        if (d && d.merged) setKpiPack(d);
                        else setKpiPack(null);
                    })
                    .catch(() => {
                        if (!cancelled) setKpiPack(null);
                    });
                return () => {
                    cancelled = true;
                };
            }, [filterCtx.project, filterCtx.buyer, filterCtx.processor, filterCtx.period, filterCtx.reportDate, filterCtx.dateFrom, filterCtx.dateTo, user.role, kpiReloadKey]);

            const kpiHint =
                user.role === ROLES.ADMIN && filterCtx.project !== 'all'
                    ? kpiPack && kpiPack.liveKeys && kpiPack.liveKeys.length
                        ? `Админ · финсрез: spend, revenue, fd, fdSum (и объёмы) суммируются по всем отчётам проекта; конверсии/планы — из последнего отчёта. Сейчас в данных: ${kpiPack.liveKeys.join(', ')}. Ниже — демо.`
                        : 'Админ: в финсрезе сверху без отчётов будет «—». В канал — metrics: spend, revenue, fd, fdSum (каждый пост суммируется к общему).'
                    : kpiPack && kpiPack.source === 'mixed' && kpiPack.liveKeys && kpiPack.liveKeys.length
                      ? `Живые поля из отчётов: ${kpiPack.liveKeys.join(', ')}. Остальное — демо.`
                      : filterCtx.project !== 'all'
                        ? 'Живые цифры: бот админом в канале → привязка chat_id к проекту в «ИИ-аналитик» → пост с метриками (spend, revenue, fd, fdSum, pdp, rd…).'
                        : null;

            const tabTitle = useMemo(() => {
                const t = nav.find((x) => x.id === activeTab);
                return t ? t.name : 'Дашборд';
            }, [activeTab, nav]);

            const renderMain = () => {
                if (activeTab === 'ai-eye') {
                    return <AiAnalystView user={user} filterCtx={filterCtx} />;
                }
                if (activeTab === 'roadmap') {
                    return <RoadmapView />;
                }
                if (activeTab === 'bot-reports') {
                    if (user.role === ROLES.ADMIN) {
                        return <BotReportsAuditView />;
                    }
                    return <Placeholder title="Отчеты бота" text="Раздел доступен только администратору." />;
                }
                if (activeTab === 'users') {
                    if (user.role === ROLES.ADMIN) return <UsersAdminView />;
                    return <Placeholder title="Сотрудники" text="Раздел доступен только администратору." />;
                }
                if (activeTab !== 'dashboard') {
                    return (
                        <Placeholder
                            title={tabTitle}
                            text="Раздел в демо: заглушка. Основные KPI по роли — на вкладке «Дашборд»."
                        />
                    );
                }
                switch (user.role) {
                    case ROLES.BUYING:
                        return <BuyingView filterCtx={filterCtx} kpiPack={kpiPack} />;
                    case ROLES.PROCESSING:
                        return <ProcessingView filterCtx={filterCtx} kpiPack={kpiPack} />;
                    case ROLES.ADMIN:
                        return (
                            <AdminView
                                filterCtx={filterCtx}
                                kpiPack={kpiPack}
                                canEditMetrics={canEditSingleDay}
                                onEditMetric={editMetricForDay}
                            />
                        );
                    case ROLES.CONTENT:
                        return <ContentView filterCtx={filterCtx} kpiPack={kpiPack} />;
                    default:
                        return <Placeholder title="Дашборд" text="Нет данных для роли." />;
                }
            };

            return (
                <div className="app-shell">
                    <div className={`overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />
                    <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="sidebar-brand">
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                <div className="logo-dot">D7</div>
                                <div>
                                    <h1>D7</h1>
                                    <span>CRM · раскрутка</span>
                                </div>
                            </div>
                        </div>
                        <nav className="nav-scroll">
                            {nav.map((tab) => (
                                <button
                                    key={tab.id}
                                    type="button"
                                    className={`nav-item ${activeTab === tab.id ? 'active' : ''}`}
                                    onClick={() => {
                                        setActiveTab(tab.id);
                                        setSidebarOpen(false);
                                    }}
                                >
                                    <span>{tab.icon}</span>
                                    {tab.name}
                                </button>
                            ))}
                        </nav>
                        <div className="sidebar-footer">
                            {user.name}
                            <br />
                            <span className="role-badge">{ROLE_LABELS[user.role] || user.role}</span>
                        </div>
                    </aside>
                    <div className="main">
                        <header className="topbar">
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0 }}>
                                <button
                                    type="button"
                                    className="mobile-toggle"
                                    onClick={() => setSidebarOpen(true)}
                                    aria-label="Меню"
                                >
                                    ☰ Меню
                                </button>
                                <h2 style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                    {tabTitle}
                                </h2>
                            </div>
                            <button type="button" className="btn btn-ghost" onClick={onLogout}>
                                Выйти
                            </button>
                        </header>
                        <main className="content">
                            {activeTab === 'dashboard' && (
                                <DashboardFilters
                                    user={user}
                                    period={dashPeriod}
                                    setPeriod={setDashPeriod}
                                    reportDate={dashDate}
                                    setReportDate={setDashDate}
                                    dateFrom={dashDateFrom}
                                    setDateFrom={setDashDateFrom}
                                    dateTo={dashDateTo}
                                    setDateTo={setDashDateTo}
                                    project={dashProject}
                                    setProject={setDashProject}
                                    buyer={dashBuyer}
                                    setBuyer={setDashBuyer}
                                    buyerOptions={buyerOptions}
                                    processor={dashProcessor}
                                    setProcessor={setDashProcessor}
                                    processorOptions={processorOptions}
                                    kpiHint={kpiHint}
                                />
                            )}
                            {renderMain()}
                        </main>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            if (user) return <Dashboard user={user} onLogout={() => setUser(null)} />;
            return <LoginForm onLogin={setUser} />;
        }

        const root = document.getElementById('root');
        if (root) ReactDOM.render(<App />, root);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>D7 — CRM</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #030308;
            --bg-mid: #08080f;
            --surface: #0e0e16;
            --surface2: #14141f;
            --border: rgba(0, 255, 220, .22);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #5fffd8;
            --accent2: #ff4da6;
            --neon-glow: 0 0 28px rgba(0, 255, 210, .65), 0 0 64px rgba(255, 77, 166, .3);
            --green: #4ade80;
            --blue: #38bdf8;
            --purple: #ff4da6;
            --danger: #fb7185;
            --sidebar-w: 260px;
            --radius: 14px;
            --shadow: 0 8px 40px rgba(0, 0, 0, .75);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body, #root {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: var(--font);
            background:
                radial-gradient(ellipse 95% 55% at 50% -15%, rgba(0, 255, 210, .11), transparent 48%),
                radial-gradient(ellipse 55% 40% at 100% 5%, rgba(255, 77, 166, .09), transparent 42%),
                linear-gradient(180deg, var(--bg-mid) 0%, var(--bg) 50%, #020208 100%);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .app-shell {
            display: flex;
            min-height: 100%;
            min-height: 100dvh;
        }
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: linear-gradient(180deg, #06060c 0%, #0c0c14 100%);
            border-right: 1px solid var(--border);
            box-shadow: inset -1px 0 0 rgba(0, 255, 210, .1);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            align-self: flex-start;
            height: 100vh;
            height: 100dvh;
            z-index: 20;
            transition: transform .28s ease;
        }
        .sidebar-brand {
            padding: 20px 18px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-brand h1 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -.02em;
        }
        .sidebar-brand span {
            display: block;
            font-size: .72rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .logo-dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #000000;
            font-size: 13px;
            letter-spacing: -0.02em;
            box-shadow: var(--neon-glow);
            border: 1px solid rgba(0, 255, 210, .55);
        }
        .nav-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px 24px;
        }
        .nav-item {
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 11px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: .9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            transition: background .15s, color .15s;
        }
        .nav-item:hover { background: rgba(255,255,255,.05); color: var(--text); }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(0, 255, 210, .16) 0%, transparent 100%);
            color: var(--text);
            border-left: 3px solid var(--accent);
            padding-left: 9px;
            text-shadow: 0 0 18px rgba(0, 255, 210, .55);
        }
        .sidebar-footer {
            padding: 14px;
            border-top: 1px solid var(--border);
            font-size: .75rem;
            color: var(--muted);
        }
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 8, 14, .94);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topbar h2 { margin: 0; font-size: 1.15rem; font-weight: 600; }
        .role-badge {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--accent);
            background: rgba(0, 255, 200, .08);
            border: 1px solid rgba(0, 255, 200, .35);
            padding: 4px 10px;
            border-radius: 999px;
            box-shadow: 0 0 16px rgba(0, 255, 200, .2);
        }
        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, #00d4ff 48%, var(--accent2) 100%);
            color: #000000;
            border: none;
            padding: 9px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: .88rem;
            box-shadow: 0 0 28px rgba(0, 255, 200, .35), 0 0 40px rgba(255, 0, 136, .15);
            transition: box-shadow .2s, transform .15s;
        }
        .btn:hover {
            box-shadow: 0 0 40px rgba(0, 255, 200, .5), 0 0 60px rgba(255, 0, 136, .2);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: rgba(0, 255, 200, .06);
            color: var(--text);
            border: 1px solid rgba(0, 255, 200, .22);
            box-shadow: none;
        }
        .btn-ghost:hover {
            background: rgba(0, 255, 200, .1);
            box-shadow: 0 0 20px rgba(0, 255, 200, .2);
        }
        .content {
            padding: 18px;
            flex: 1;
            overflow-x: auto;
        }
        .grid-kpi {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: linear-gradient(145deg, var(--surface) 0%, var(--surface2) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            animation: fadeUp .45s ease backwards;
            box-shadow: 0 0 0 1px rgba(0, 255, 210, .12), 0 6px 32px rgba(0, 0, 0, .55);
        }
        .kpi-card .label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
        .kpi-card .value {
            font-size: 1.45rem;
            font-weight: 700;
            margin-top: 6px;
            background: linear-gradient(90deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .kpi-card .sub { font-size: .75rem; color: var(--muted); margin-top: 4px; }
        .kpi-card .trend {
            font-size: .72rem;
            font-weight: 600;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .kpi-card .trend.up { color: var(--green); }
        .kpi-card .trend.down { color: var(--danger); }
        .kpi-card .trend.neutral { color: var(--muted); }
        .kpi-card.kpi-large {
            grid-column: span 2;
            padding: 18px 20px;
        }
        .kpi-card.kpi-large .value { font-size: 1.85rem; }
        @media (max-width: 700px) {
            .kpi-card.kpi-large { grid-column: span 1; }
        }
        .grid-kpi-hero {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 8px;
        }
        .grid-kpi-hero.kpi-hero-4 {
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        }
        .grid-kpi-hero.kpi-hero-6 {
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }
        .kpi-card.kpi-from-live {
            border-color: rgba(0, 255, 210, .42);
            box-shadow: 0 0 20px rgba(0, 255, 210, .12);
        }
        .kpi-live-tag {
            font-size: .62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-top: 8px;
            font-weight: 600;
        }
        .dash-welcome {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .dash-welcome h2 { margin: 0 0 6px; font-size: 1.2rem; font-weight: 700; letter-spacing: -.02em; }
        .dash-welcome .meta { margin: 0; font-size: .82rem; color: var(--muted); line-height: 1.45; }
        .period-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .period-bar span { font-size: .72rem; color: var(--muted); margin-right: 4px; }
        .period-bar button {
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--muted);
            cursor: pointer;
            font-size: .8rem;
            font-weight: 500;
            transition: border-color .15s, box-shadow .15s, color .15s;
        }
        .period-bar button:hover { color: var(--text); border-color: rgba(0, 255, 200, .3); }
        .period-bar button.active {
            background: rgba(0, 255, 200, .1);
            color: var(--accent);
            border-color: rgba(0, 255, 200, .45);
            box-shadow: 0 0 16px rgba(0, 255, 200, .12);
        }
        .dash-section-title {
            font-size: .7rem;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            margin: 22px 0 10px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .dash-section-title span.hint { font-weight: 400; letter-spacing: 0; text-transform: none; font-size: .78rem; color: var(--muted); opacity: .9; }
        .progress-track {
            height: 10px;
            border-radius: 6px;
            background: var(--surface2);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            box-shadow: 0 0 14px rgba(0, 255, 200, .35);
            transition: width .35s ease;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: .75rem;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .insights-panel h3 { font-size: .92rem; }
        .insights {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .insights li {
            padding: 10px 12px 10px 14px;
            border-left: 3px solid var(--accent);
            background: rgba(0, 255, 200, .04);
            margin-bottom: 8px;
            border-radius: 0 10px 10px 0;
            font-size: .84rem;
            line-height: 1.45;
        }
        .insights li:last-child { margin-bottom: 0; }
        .funnel-grid { display: flex; flex-direction: column; gap: 12px; }
        .funnel-item { display: grid; grid-template-columns: 1fr auto; gap: 8px 12px; align-items: center; }
        .funnel-item .name { font-size: .82rem; font-weight: 500; }
        .funnel-item .pct { font-size: .85rem; font-weight: 700; color: var(--accent); min-width: 52px; text-align: right; }
        .funnel-item .bar-row { grid-column: 1 / -1; }
        .spark-wrap { margin-top: 8px; }
        .spark-label { font-size: .72rem; color: var(--muted); margin-bottom: 6px; }
        .spark-bars { display: flex; align-items: flex-end; gap: 5px; height: 48px; }
        .spark-bars i {
            flex: 1;
            min-width: 6px;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(180deg, var(--accent), rgba(255, 0, 136, .35));
            opacity: .9;
        }
        .stat-inline { font-size: .78rem; color: var(--muted); }
        .stat-inline strong { color: var(--text); }
        .two-col-dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; align-items: start; }
        table.data td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .chip {
            padding: 5px 11px;
            border-radius: 999px;
            font-size: .75rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--muted);
        }
        .chip.on { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 200, .08); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 16px;
        }
        .panel h3 { margin: 0 0 12px; font-size: .95rem; font-weight: 600; }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
            align-items: center;
        }
        .filters label { font-size: .78rem; color: var(--muted); }
        .dashboard-filters .filters {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            align-items: end;
            gap: 14px 20px;
        }
        .dashboard-filters .filters > div {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .dashboard-filters .filters select { width: 100%; }
        .filter-context {
            font-size: .8rem;
            color: var(--muted);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .ai-banner { position: relative; border-color: rgba(255, 77, 166, .35); }
        .ai-banner .ai-dismiss {
            position: absolute;
            top: 12px;
            right: 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }
        .ai-banner .ai-dismiss:hover { color: var(--text); border-color: var(--accent); }
        .ai-banner .ai-pre {
            margin: 0;
            white-space: pre-wrap;
            font-family: inherit;
            font-size: .88rem;
            color: var(--text);
            line-height: 1.55;
        }
        .ai-banner h3 { margin: 0 0 10px; font-size: .98rem; }
        .field-row-api {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }
        .field-row-api input { flex: 1; min-width: 220px; }
        .ai-prompt-area {
            width: 100%;
            min-height: 180px;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: .85rem;
            line-height: 1.45;
            resize: vertical;
        }
        select, input[type="search"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: .85rem;
        }
        table.data {
            width: 100%;
            border-collapse: collapse;
            font-size: .82rem;
        }
        table.data th, table.data td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        table.data th { color: var(--muted); font-weight: 500; }
        .funnel-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .bar {
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            min-width: 4px;
            box-shadow: 0 0 14px rgba(0, 255, 200, .45);
        }
        .mobile-toggle {
            display: none;
            background: rgba(255,255,255,.08);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 15;
        }
        .overlay.open { display: block; }
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                box-shadow: var(--shadow);
            }
            .sidebar.open { transform: translateX(0); }
            .mobile-toggle { display: inline-flex; align-items: center; gap: 6px; }
        }
        .login-wrap {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(ellipse 80% 45% at 50% 0%, rgba(0, 255, 200, .1), transparent 50%),
                radial-gradient(ellipse 55% 40% at 100% 100%, rgba(255, 0, 136, .12), transparent 48%),
                #000000;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(165deg, #080808 0%, #000000 100%);
            border: 1px solid rgba(0, 255, 200, .25);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow), var(--neon-glow);
        }
        .login-card input {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
        }
        .demo-hint {
            margin-top: 18px;
            padding: 12px;
            background: rgba(0, 255, 200, .06);
            border: 1px solid rgba(0, 255, 200, .14);
            border-radius: 8px;
            font-size: .75rem;
            color: var(--muted);
            line-height: 1.5;
        }
        .two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: .78rem;
            border-radius: 8px;
        }
        .roadmap-board {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            overflow-x: auto;
            padding-bottom: 12px;
            min-height: min(70vh, 640px);
            -webkit-overflow-scrolling: touch;
        }
        .roadmap-col {
            flex: 0 0 min(300px, 85vw);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-height: calc(100dvh - 200px);
            display: flex;
            flex-direction: column;
        }
        .roadmap-col-header {
            padding: 12px 14px;
            font-weight: 600;
            font-size: .88rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .roadmap-col-header input {
            flex: 1;
            min-width: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 8px;
            border-radius: 6px;
            font-size: .85rem;
        }
        .roadmap-col-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .roadmap-col-body.drag-over {
            outline: 2px dashed var(--accent);
            outline-offset: -4px;
            border-radius: 8px;
        }
        .roadmap-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: grab;
            text-align: left;
            width: 100%;
            color: inherit;
            font: inherit;
            transition: box-shadow .15s, border-color .15s;
        }
        .roadmap-card:hover {
            border-color: rgba(0, 255, 200, .45);
            box-shadow: 0 0 20px rgba(0, 255, 200, .12), 0 4px 20px rgba(0, 0, 0, .5);
        }
        .roadmap-card:active { cursor: grabbing; }
        .roadmap-card-title { font-weight: 600; font-size: .88rem; margin: 0 0 6px; }
        .roadmap-card-meta { font-size: .72rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px 10px; }
        .roadmap-card .due { color: var(--accent); }
        .roadmap-card .due.soon { color: #fbbf24; }
        .roadmap-card .due.over { color: var(--danger); }
        .roadmap-add-card {
            margin-top: 4px;
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            font-size: .8rem;
        }
        .roadmap-add-card:hover { border-color: var(--accent); color: var(--accent); }
        .roadmap-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .roadmap-toolbar p { margin: 0; font-size: .82rem; color: var(--muted); flex: 1; min-width: 200px; }
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            width: 100%;
            max-width: 440px;
            max-height: 90dvh;
            overflow-y: auto;
            box-shadow: var(--shadow), var(--neon-glow);
        }
        .modal-card h3 { margin: 0 0 16px; font-size: 1rem; }
        .modal-card label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 4px; }
        .modal-card input, .modal-card textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font: inherit;
        }
        .modal-card textarea { min-height: 80px; resize: vertical; }
        .modal-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .employees-intro { font-size: .85rem; color: var(--muted); margin: 0 0 16px; max-width: 720px; }
        .employees-add {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            align-items: end;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .employees-add > div { display: flex; flex-direction: column; gap: 6px; }
        .employees-add label { font-size: .72rem; color: var(--muted); }
        .employees-add input, .employees-add select {
            width: 100%;
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);

        }
        .employees-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
        table.employees-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
        table.employees-table th {
            text-align: left;
            padding: 12px 14px;
            background: rgba(0, 255, 200, .06);
            color: var(--muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }
        table.employees-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        table.employees-table tr:last-child td { border-bottom: none; }
        table.employees-table tr:hover td { background: rgba(0, 255, 200, .04); }
        table.employees-table select.status-select {
            min-width: 200px;
            padding: 8px 12px;
            font-size: .78rem;
            font-weight: 600;
            border-radius: 999px;
            cursor: pointer;
            appearance: auto;
        }
        table.employees-table select.status-select.paid {
            background: rgba(52, 211, 153, .15);
            color: #6ee7b7;
            border: 1px solid rgba(52, 211, 153, .4);
        }
        table.employees-table select.status-select.pending {
            background: rgba(251, 191, 36, .12);
            color: #fcd34d;
            border: 1px solid rgba(251, 191, 36, .4);
        }
        table.employees-table select.status-select.scheduled {
            background: rgba(255, 0, 170, .12);
            color: #ff66cc;
            border: 1px solid rgba(255, 0, 136, .45);
        }
        table.employees-table select.status-select.hold {
            background: rgba(251, 113, 133, .12);
            color: #fda4af;
            border: 1px solid rgba(251, 113, 133, .4);
        }
        .payroll-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
        .payroll-toolbar input[type="search"] {
            flex: 1;
            min-width: 200px;
            max-width: 360px;
        }
        .payroll-stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }
        .payroll-stat {
            background: linear-gradient(145deg, var(--surface2), var(--surface));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 0 20px rgba(0, 255, 210, .06);
        }
        .payroll-stat .n { font-size: 1.35rem; font-weight: 800; color: var(--accent); }
        .payroll-stat .l { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
        .payroll-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 0 24px rgba(0, 255, 210, .05);
        }
        table.payroll-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .8rem;
        }
        table.payroll-table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: rgba(0, 255, 210, .1);
            color: var(--muted);
            font-weight: 600;
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        table.payroll-table td {
            padding: 11px 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        table.payroll-table tbody tr:hover td { background: rgba(0, 255, 210, .05); }
        table.payroll-table .tg { color: var(--accent); font-weight: 600; }
        table.payroll-table .terms {
            max-width: 320px;
            line-height: 1.45;
            color: var(--text);
            word-break: break-word;
        }
        .hr-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: .72rem;
            font-weight: 600;
        }
        .hr-pill.staff {
            background: rgba(74, 222, 128, .15);
            color: #86efac;
            border: 1px solid rgba(74, 222, 128, .35);
        }
        .hr-pill.trainee {
            background: rgba(251, 191, 36, .12);
            color: #fcd34d;
            border: 1px solid rgba(251, 191, 36, .35);
        }
        .sheet-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 14px;
            border: 1px solid rgba(0, 255, 210, .35);
            border-radius: 10px;
            background: rgba(0, 255, 210, .08);
        }
        .sheet-link:hover { background: rgba(0, 255, 210, .14); box-shadow: 0 0 20px rgba(0, 255, 210, .15); }
        .payroll-form {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            align-items: end;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }
        .payroll-form > div { display: flex; flex-direction: column; gap: 6px; }
        .payroll-form label { font-size: .72rem; color: var(--muted); }
        .payroll-form input, .payroll-form select {
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: .85rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo, useEffect, useCallback } = React;

        function getCrmApiBase() {
            try {
                const saved = localStorage.getItem('d7_crm_api_base');
                if (saved) return saved;
                if (typeof window !== 'undefined') {
                    const h = window.location.hostname;
                    if (h === 'localhost' || h === '127.0.0.1') {
                        return `http://${h}:3847`;
                    }
                }
                return 'http://127.0.0.1:3847';
            } catch (e) {
                return 'http://127.0.0.1:3847';
            }
        }

        function persistCrmApiBase(url) {
            try {
                if (url && String(url).trim()) {
                    localStorage.setItem('d7_crm_api_base', String(url).trim().replace(/\/$/, ''));
                }
            } catch (e) {}
        }

        function numOr(v, fallback) {
            return typeof v === 'number' && Number.isFinite(v) ? v : 0;
        }

        function fmtUsd(n, fb) {
            const v = numOr(n, null);
            if (v === null) return '$0';
            return '$' + Math.round(v).toLocaleString('ru-RU');
        }

        /** Доля 0–1 или проценты → число для полоски/таблицы (например 68.4). */
        function ratioPctNumber(merged, key, defaultPct) {
            const v = merged[key];
            if (typeof v !== 'number' || !Number.isFinite(v)) return defaultPct;
            return v <= 1 ? v * 100 : v;
        }

        const ROADMAP_STORAGE = 'd7-roadmap-v1';

        function uid() {
            return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
        }

        function defaultRoadmapBoard() {
            return {
                columns: [
                    {
                        id: uid(),
                        title: 'Backlog',
                        cards: [
                            { id: uid(), title: 'Подключить пиксель Перу 1', description: '', startDate: '', dueDate: '', priority: 'med' },
                            { id: uid(), title: 'Сверка кассы за неделю', description: '', startDate: '', dueDate: '', priority: 'high' }
                        ]
                    },
                    {
                        id: uid(),
                        title: 'В работе',
                        cards: [
                            { id: uid(), title: 'Креативы для Мексики', description: '3 варианта на тест', startDate: '', dueDate: '', priority: 'low' }
                        ]
                    },
                    {
                        id: uid(),
                        title: 'Готово',
                        cards: []
                    }
                ]
            };
        }

        function loadRoadmap() {
            try {
                const raw = localStorage.getItem(ROADMAP_STORAGE);
                if (raw) {
                    const p = JSON.parse(raw);
                    if (p && Array.isArray(p.columns)) return p;
                }
            } catch (e) {}
            return defaultRoadmapBoard();
        }

        function saveRoadmap(board) {
            try {
                localStorage.setItem(ROADMAP_STORAGE, JSON.stringify(board));
            } catch (e) {}
        }

        function formatDueLabel(dueDate) {
            if (!dueDate) return null;
            const d = new Date(dueDate + 'T12:00:00');
            if (Number.isNaN(d.getTime())) return dueDate;
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        function dueClass(dueDate) {
            if (!dueDate) return '';
            const end = new Date(dueDate + 'T23:59:59');
            const now = new Date();
            if (end < now) return 'over';
            const in3 = new Date(now);
            in3.setDate(in3.getDate() + 3);
            if (end <= in3) return 'soon';
            return '';
        }

        function RoadmapView() {
            const [board, setBoard] = useState(loadRoadmap);
            const [drag, setDrag] = useState(null);
            const [editing, setEditing] = useState(null);
            const [colAddTitle, setColAddTitle] = useState('');

            useEffect(() => {
                saveRoadmap(board);
            }, [board]);

            const openEdit = useCallback((columnId, card) => {
                setEditing({ columnId, card: { ...card } });
            }, []);

            const closeEdit = useCallback(() => setEditing(null), []);

            const saveEdit = useCallback(() => {
                if (!editing) return;
                const { columnId, card } = editing;
                if (!String(card.title || '').trim()) return;
                const next = {
                    ...card,
                    title: String(card.title).trim(),
                    description: card.description || '',
                    startDate: card.startDate || '',
                    dueDate: card.dueDate || '',
                    priority: card.priority || 'med'
                };
                setBoard((b) => ({
                    columns: b.columns.map((col) =>
                        col.id !== columnId
                            ? col
                            : { ...col, cards: col.cards.map((c) => (c.id === card.id ? next : c)) }
                    )
                }));
                closeEdit();
            }, [editing, closeEdit]);

            const deleteCard = useCallback(() => {
                if (!editing) return;
                const { columnId, card } = editing;
                setBoard((b) => ({
                    columns: b.columns.map((col) =>
                        col.id !== columnId ? col : { ...col, cards: col.cards.filter((c) => c.id !== card.id) }
                    )
                }));
                closeEdit();
            }, [editing, closeEdit]);

            const addColumn = useCallback(() => {
                const t = colAddTitle.trim();
                if (!t) return;
                setBoard((b) => ({
                    columns: [...b.columns, { id: uid(), title: t, cards: [] }]
                }));
                setColAddTitle('');
            }, [colAddTitle]);

            const setColumnTitle = useCallback((columnId, title) => {
                setBoard((b) => ({
                    columns: b.columns.map((c) => (c.id === columnId ? { ...c, title: String(title) } : c))
                }));
            }, []);

            const finalizeColumnTitle = useCallback((columnId, title) => {
                const t = String(title).trim() || 'Без названия';
                setBoard((b) => ({
                    columns: b.columns.map((c) => (c.id === columnId ? { ...c, title: t } : c))
                }));
            }, []);

            const removeColumn = useCallback((columnId) => {
                if (!window.confirm('Удалить колонку и все карточки в ней?')) return;
                setBoard((b) => ({ columns: b.columns.filter((c) => c.id !== columnId) }));
            }, []);

            const addCard = useCallback((columnId) => {
                const title = window.prompt('Название задачи', '');
                if (!title || !title.trim()) return;
                const card = {
                    id: uid(),
                    title: title.trim(),
                    description: '',
                    startDate: '',
                    dueDate: '',
                    priority: 'med'
                };
                setBoard((b) => ({
                    columns: b.columns.map((col) =>
                        col.id !== columnId ? col : { ...col, cards: [...col.cards, card] }
                    )
                }));
            }, []);

            const onDragStart = (e, columnId, cardId) => {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('application/json', JSON.stringify({ columnId, cardId }));
                setDrag({ columnId, cardId });
            };

            const onDragEnd = () => setDrag(null);

            const onDragOverCol = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const onDropCol = (e, targetColumnId) => {
                e.preventDefault();
                let data;
                try {
                    data = JSON.parse(e.dataTransfer.getData('application/json') || '{}');
                } catch (err) {
                    return;
                }
                const { columnId: fromCol, cardId } = data;
                if (!fromCol || !cardId) return;
                setBoard((b) => {
                    let card = null;
                    const cols = b.columns.map((col) => {
                        if (col.id !== fromCol) return col;
                        const idx = col.cards.findIndex((c) => c.id === cardId);
                        if (idx < 0) return col;
                        card = col.cards[idx];
                        return { ...col, cards: col.cards.filter((c) => c.id !== cardId) };
                    });
                    if (!card) return b;
                    return {
                        columns: cols.map((col) =>
                            col.id !== targetColumnId ? col : { ...col, cards: [...col.cards, card] }
                        )
                    };
                });
                setDrag(null);
            };

            return (
                <>
                    <div className="roadmap-toolbar">
                        <p>Перетаскивайте карточки между колонками. Клик по карточке — сроки, описание, приоритет. Данные сохраняются в браузере.</p>
                        <input
                            type="text"
                            placeholder="Новая колонка…"
                            value={colAddTitle}
                            onChange={(e) => setColAddTitle(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && addColumn()}
                            style={{ maxWidth: 200, flex: '0 1 200px' }}
                        />
                        <button type="button" className="btn btn-sm" onClick={addColumn}>
                            + Колонка
                        </button>
                    </div>
                    <div className="roadmap-board">
                        {board.columns.map((col) => (
                            <div key={col.id} className="roadmap-col">
                                <div className="roadmap-col-header">
                                    <input
                                        value={col.title}
                                        onChange={(e) => setColumnTitle(col.id, e.target.value)}
                                        onBlur={(e) => finalizeColumnTitle(col.id, e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && e.target.blur()}
                                        aria-label="Название колонки"
                                    />
                                    <button
                                        type="button"
                                        className="btn btn-ghost btn-sm"
                                        onClick={() => removeColumn(col.id)}
                                        title="Удалить колонку"
                                    >
                                        ✕
                                    </button>
                                </div>
                                <div
                                    className={'roadmap-col-body' + (drag ? '' : '')}
                                    onDragOver={onDragOverCol}
                                    onDrop={(e) => onDropCol(e, col.id)}
                                >
                                    {col.cards.map((card) => (
                                        <button
                                            key={card.id}
                                            type="button"
                                            className="roadmap-card"
                                            draggable
                                            onDragStart={(e) => onDragStart(e, col.id, card.id)}
                                            onDragEnd={onDragEnd}
                                            onClick={() => openEdit(col.id, card)}
                                        >
                                            <div className="roadmap-card-title">{card.title}</div>
                                            <div className="roadmap-card-meta">
                                                {card.priority === 'high' && <span>Высокий</span>}
                                                {card.priority === 'low' && <span>Низкий</span>}
                                                {card.startDate && (
                                                    <span>с {formatDueLabel(card.startDate)}</span>
                                                )}
                                                {card.dueDate && (
                                                    <span className={'due ' + dueClass(card.dueDate)}>
                                                        до {formatDueLabel(card.dueDate)}
                                                    </span>
                                                )}
                                            </div>
                                        </button>
                                    ))}
                                    <button type="button" className="roadmap-add-card" onClick={() => addCard(col.id)}>
                                        + Добавить задачу
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {editing && (
                        <div className="modal-backdrop" onClick={closeEdit} role="presentation">
                            <div className="modal-card" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
                                <h3>Задача</h3>
                                <label>Название</label>
                                <input
                                    value={editing.card.title}
                                    onChange={(e) =>
                                        setEditing((x) => (x ? { ...x, card: { ...x.card, title: e.target.value } } : x))
                                    }
                                />
                                <label>Описание</label>
                                <textarea
                                    value={editing.card.description || ''}
                                    onChange={(e) =>
                                        setEditing((x) => (x ? { ...x, card: { ...x.card, description: e.target.value } } : x))
                                    }
                                />
                                <label>Дата старта</label>
                                <input
                                    type="date"
                                    value={editing.card.startDate || ''}
                                    onChange={(e) =>
                                        setEditing((x) => (x ? { ...x, card: { ...x.card, startDate: e.target.value } } : x))
                                    }
                                />
                                <label>Срок (дедлайн)</label>
                                <input
                                    type="date"
                                    value={editing.card.dueDate || ''}
                                    onChange={(e) =>
                                        setEditing((x) => (x ? { ...x, card: { ...x.card, dueDate: e.target.value } } : x))
                                    }
                                />
                                <label>Приоритет</label>
                                <select
                                    value={editing.card.priority || 'med'}
                                    onChange={(e) =>
                                        setEditing((x) => (x ? { ...x, card: { ...x.card, priority: e.target.value } } : x))
                                    }
                                    style={{ width: '100%', marginBottom: 12 }}
                                >
                                    <option value="low">Низкий</option>
                                    <option value="med">Средний</option>
                                    <option value="high">Высокий</option>
                                </select>
                                <div className="modal-actions">
                                    <button type="button" className="btn" onClick={saveEdit}>
                                        Сохранить
                                    </button>
                                    <button type="button" className="btn btn-ghost" onClick={closeEdit}>
                                        Отмена
                                    </button>
                                    <button type="button" className="btn btn-ghost" onClick={deleteCard} style={{ marginLeft: 'auto', borderColor: 'rgba(255, 77, 109, .45)' }}>
                                        Удалить задачу
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        const ROLES = {
            BUYING: 'BUYING',
            PROCESSING: 'PROCESSING',
            ADMIN: 'ADMIN',
            CONTENT: 'CONTENT'
        };

        const ROLE_LABELS = {
            [ROLES.BUYING]: 'Байинг',
            [ROLES.PROCESSING]: 'Обработка',
            [ROLES.ADMIN]: 'Админ состав',
            [ROLES.CONTENT]: 'Контент'
        };

        const PROJECT_OPTIONS = [
            { value: 'all', label: 'Все проекты' },
            { value: 'peru1', label: 'Перу 1' },
            { value: 'argentina', label: 'Аргентина' },
            { value: 'mexico', label: 'Мексика' },
            { value: 'chile', label: 'Чили' },
            { value: 'italy', label: 'Италия' },
            { value: 'peru2', label: 'Перу 2' }
        ];

        const BUYER_OPTIONS = [{ value: 'all', label: 'Все баеры' }];

        function projectLabel(v) {
            const o = PROJECT_OPTIONS.find((x) => x.value === v);
            return o ? o.label : v;
        }
        function buyerLabel(v, buyerOptions) {
            const o = (buyerOptions || BUYER_OPTIONS).find((x) => x.value === v);
            return o ? o.label : v;
        }
        function processorLabel(v, processorOptions) {
            const o = (processorOptions || []).find((x) => x.value === v);
            return o ? o.label : v;
        }

        const DASH_PERIODS = [
            { id: 'today', label: 'Сегодня' },
            { id: '7d', label: '7 дней' },
            { id: '30d', label: '30 дней' }
        ];

        function dashPeriodLabel(id) {
            const p = DASH_PERIODS.find((x) => x.id === id);
            return p ? p.label : id;
        }

        function todayIsoDate() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function DashboardFilters({
            user,
            period,
            setPeriod,
            reportDate,
            setReportDate,
            dateFrom,
            setDateFrom,
            dateTo,
            setDateTo,
            project,
            setProject,
            buyer,
            setBuyer,
            buyerOptions,
            processor,
            setProcessor,
            processorOptions,
            kpiHint
        }) {
            const roleName = ROLE_LABELS[user.role] || user.role;
            const dateLine = new Date().toLocaleDateString('ru-RU', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            return (
                <div className="panel dashboard-filters">
                    <div className="dash-welcome">
                        <div>
                            <h2>Дашборд</h2>
                            <p className="meta">
                                {user.name} · {roleName}
                                <br />
                                {dateLine}
                            </p>
                        </div>
                        <div className="period-bar">
                            <span>Период:</span>
                            {DASH_PERIODS.map((p) => (
                                <button
                                    key={p.id}
                                    type="button"
                                    className={period === p.id ? 'active' : ''}
                                    onClick={() => setPeriod(p.id)}
                                >
                                    {p.label}
                                </button>
                            ))}
                            <span style={{ marginLeft: 8 }}>Дата:</span>
                            <input
                                type="date"
                                value={reportDate}
                                onChange={(e) => {
                                    setReportDate(e.target.value || todayIsoDate());
                                    setPeriod('today');
                                }}
                                style={{
                                    height: 32,
                                    borderRadius: 10,
                                    border: '1px solid var(--border)',
                                    background: 'rgba(255,255,255,.02)',
                                    color: 'var(--text)',
                                    padding: '0 10px'
                                }}
                            />
                            <span style={{ marginLeft: 8 }}>С:</span>
                            <input
                                type="date"

        const DEMO_USERS = [
            { keys: ['buying@example.com'], password: 'buy123', name: 'Баер · D7', role: ROLES.BUYING },
            { keys: ['proc@example.com', 'processing@example.com'], password: 'proc123', name: 'Обработка · D7', role: ROLES.PROCESSING },
            { keys: ['admin@example.com', 'admin'], password: 'admin123', name: 'Админ · D7', role: ROLES.ADMIN },
            { keys: ['content@example.com'], password: 'cont123', name: 'Контент · D7', role: ROLES.CONTENT },
            { keys: ['buyer@example.com'], password: 'buyer123', name: 'Баер (legacy)', role: ROLES.BUYING },
            { keys: ['owner@example.com'], password: 'owner123', name: 'Владелец · D7', role: ROLES.ADMIN },
            { keys: ['d7', 'demo'], password: 'd7', name: 'D7 · Быстрый вход', role: ROLES.ADMIN }
        ];
        const ACCOUNTS_STORAGE = 'd7-accounts-v1';

        function normalizeLogin(v) {
            return String(v || '')
                .trim()
                .toLowerCase();
        }

        function seedAccounts() {
            return [];
        }

        function loadAccounts() {
            try {
                const raw = localStorage.getItem(ACCOUNTS_STORAGE);
                if (raw) {
                    const arr = JSON.parse(raw);
                    if (Array.isArray(arr) && arr.length) return arr;
                }
            } catch (e) {}
            const seeded = seedAccounts();
            try {
                localStorage.setItem(ACCOUNTS_STORAGE, JSON.stringify(seeded));
            } catch (e) {}
            return seeded;
        }

        function saveAccounts(list) {
            try {
                localStorage.setItem(ACCOUNTS_STORAGE, JSON.stringify(list));
            } catch (e) {}
        }

        function findDemoUser(loginRaw, passwordRaw) {
            const login = String(loginRaw || '').trim().toLowerCase();
            const pass = String(passwordRaw || '').trim();
            if (!login || !pass) return null;
            return DEMO_USERS.find(
                (u) => u.keys.some((k) => String(k).toLowerCase() === login) && u.password === pass
            ) || null;
        }

        function findStoredUser(loginRaw, passwordRaw) {
            const login = normalizeLogin(loginRaw);
            const pass = String(passwordRaw || '').trim();
            if (!login || !pass) return null;
            const acc = loadAccounts().find((a) => normalizeLogin(a.login) === login && String(a.password) === pass);
            if (!acc) return null;
            return {
                id: acc.login,
                email: acc.login.includes('@') ? acc.login : `${acc.login}@d7.local`,
                name: acc.name || acc.login,
                role: acc.role
            };
        }

        function authenticateUser(loginRaw, passwordRaw) {
            const stored = findStoredUser(loginRaw, passwordRaw);
            if (stored) return stored;
            const demo = findDemoUser(loginRaw, passwordRaw);
            if (!demo) return null;
            const id = demo.keys[0];
            return { id, email: id.includes('@') ? id : `${id}@d7.local`, name: demo.name, role: demo.role };
        }

        function adminHeroMetric({ liveKeys, project, merged, key, format, demoVal }) {
            const lk = Array.isArray(liveKeys) ? liveKeys : [];
            const fromLive = lk.includes(key);
            if (!project || project === 'all') {
                const v = merged[key];
                if (format === 'usd') return { value: fmtUsd(numOr(v, 0)), fromLive };
                return { value: numOr(v, 0).toLocaleString('ru-RU'), fromLive };
            }
            if (fromLive) {
                if (format === 'usd') return { value: fmtUsd(merged[key]), fromLive: true };
                const n = merged[key];
                return {
                    value: Number.isFinite(n) ? Math.round(n).toLocaleString('ru-RU') : '—',
                    fromLive: true
                };
            }
            return { value: '—', fromLive: false };
        }

        function BotReportsAuditView() {
            const [rows, setRows] = useState([]);
            const [loading, setLoading] = useState(true);
            const [err, setErr] = useState(null);
            const [editId, setEditId] = useState(null);
            const [editText, setEditText] = useState('');
            const [saveMsg, setSaveMsg] = useState(null);

            const refresh = useCallback(() => {
                const base = getCrmApiBase().replace(/\/$/, '');
                setLoading(true);
                fetch(`${base}/api/reports/finance?limit=120`)
                    .then((r) => r.json())
                    .then((data) => {
                        if (!Array.isArray(data)) throw new Error(data.error || 'Ответ не массив');
                        setRows(data);
                        setErr(null);
                    })
                    .catch(() => setErr('Не удалось загрузить отчёты бота.'))
                    .finally(() => setLoading(false));
            }, []);

            useEffect(() => {
                refresh();
            }, [refresh]);

            const startEdit = (row) => {
                setEditId(row.id);
                setSaveMsg(null);
                try {
                    const pretty = row.full_json ? JSON.stringify(JSON.parse(row.full_json), null, 2) : '{}';
                    setEditText(pretty);
                } catch (e) {
                    setEditText(row.full_json || '{}');
                }
            };

            const saveEdit = () => {
                if (!editId) return;
                const base = getCrmApiBase().replace(/\/$/, '');
                setSaveMsg(null);
                fetch(`${base}/api/reports/finance/${editId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_json: editText })
                })
                    .then((r) => r.json().then((j) => ({ ok: r.ok, j })))
                    .then(({ ok, j }) => {
                        if (!ok) throw new Error(j.error || 'Ошибка сохранения');
                        setSaveMsg('Сохранено');
                        setEditId(null);
                        refresh();
                    })
                    .catch((e) => setSaveMsg(e.message || 'Ошибка сохранения'));
            };

            return (
                <div className="panel">
                    <h3 style={{ marginTop: 0 }}>Аудит отчётов бота</h3>
                    <p style={{ margin: '0 0 12px', fontSize: '.82rem', color: 'var(--muted)' }}>
                        Проверка: кто отправил отчёт, в каком формате пришёл текст, как он распознан. Можно править JSON
                        отчёта и сохранять обратно в CRM.
                    </p>
                    <button type="button" className="btn btn-ghost" onClick={refresh} disabled={loading}>
                        {loading ? 'Обновление...' : 'Обновить'}
                    </button>
                    {err && <p style={{ color: 'var(--danger)', margin: '10px 0 0' }}>{err}</p>}
                    <div style={{ overflowX: 'auto', marginTop: 12 }}>
                        <table className="data">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Когда</th>
                                    <th>Кто</th>
                                    <th>Источник</th>
                                    <th>Формат (сырой текст)</th>
                                    <th>Распознанный JSON</th>
                                    <th>Действие</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.map((r) => (
                                    <tr key={r.id}>
                                        <td>{r.id}</td>
                                        <td style={{ whiteSpace: 'nowrap', fontSize: '.78rem' }}>{r.created_at}</td>
                                        <td style={{ fontSize: '.8rem' }}>{r.source_username || '—'}</td>
                                        <td style={{ fontSize: '.74rem', color: 'var(--muted)' }}>
                                            {(r.chat_title || '—') + ' · ' + (r.source_kind || 'message')}
                                        </td>
                                        <td style={{ maxWidth: 320, fontSize: '.75rem', whiteSpace: 'pre-wrap' }}>
                                            {r.source_text || r.source_preview || '—'}
                                        </td>
                                        <td style={{ maxWidth: 360, fontSize: '.72rem', whiteSpace: 'pre-wrap', color: 'var(--muted)' }}>
                                            {r.full_json || '—'}
                                        </td>
                                        <td>
                                            <button type="button" className="btn btn-ghost" onClick={() => startEdit(r)}>
                                                Править
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {editId ? (
                        <div style={{ marginTop: 14 }}>
                            <h4 style={{ margin: '0 0 8px' }}>Правка отчёта #{editId}</h4>
                            <textarea
                                value={editText}
                                onChange={(e) => setEditText(e.target.value)}
                                style={{ width: '100%', minHeight: 260, fontFamily: 'monospace', fontSize: '.8rem' }}
                            />
                            <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                                <button type="button" className="btn" onClick={saveEdit}>Сохранить JSON</button>
                                <button type="button" className="btn btn-ghost" onClick={() => setEditId(null)}>Отмена</button>
                            </div>
                            {saveMsg && <p style={{ margin: '8px 0 0', color: 'var(--muted)' }}>{saveMsg}</p>}
                        </div>
                    ) : null}
                </div>
            );
        }

            try {

                    if (Array.isArray(arr) && arr.length) return arr;
                }
            } catch (e) {}

            } catch (e2) {}
